{% extends 'quiz/base.html' %}

{% block title %}Добавить вопрос{% endblock %}

{% block content %}
<h1>Добавить новый вопрос</h1>
<a href="{% url 'index' %}" class="btn btn-secondary mb-3">Назад</a>
<form method="post">
    {% csrf_token %}
    <div class="mb-3">
        <label for="question" class="form-label">Вопрос</label>
        <input type="text" class="form-control" id="question" name="question" required>
    </div>
    {% for i in '123456' %}
    <div class="mb-3">
        <label for="answer{{ i }}" class="form-label">Вариант ответа {{ i }}</label>
        <input type="text" class="form-control" id="answer{{ i }}" name="answer{{ i }}">
    </div>
    {% endfor %}
    <div class="mb-3">
        <label for="correct_answer_number" class="form-label">Номер правильного ответа</label>
        <select class="form-control" id="correct_answer_number" name="correct_answer_number" required>
            <option value="">Выберите номер</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
        </select>
    </div>
    <button type="submit" class="btn btn-primary">Добавить</button>
</form>
{% endblock %}
